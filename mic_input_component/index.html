<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: "Source Sans Pro", -apple-system, sans-serif; }

  /* Row: the text box (with mic inside) on the left, Next button on the right */
  .row { display: flex; align-items: stretch; gap: 8px; width: 100%; box-sizing: border-box; }

  .wrap { position: relative; flex: 1; min-width: 0; }

  #answer {
    width: 100%;
    box-sizing: border-box;
    padding: 0.6rem 3rem 0.6rem 0.85rem;   /* right padding leaves room for the mic */
    font-size: 1rem;
    color: #31333F;
    border: 1px solid rgba(49, 51, 63, 0.2);
    border-radius: 0.5rem;
    background-color: #f0f2f6;
    outline: none;
    line-height: 1.4;
  }
  #answer:focus { border-color: #ff4b4b; box-shadow: 0 0 0 1px #ff4b4b; }

  /* Speak button sits inside the right edge of the text box */
  #mic {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #mic:hover { background: rgba(49, 51, 63, 0.08); }
  #mic.listening {
    background: #ff4b4b;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(255, 75, 75, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); }
  }

  /* Next button to the right of the text box */
  #next {
    border: none;
    border-radius: 0.5rem;
    background: #ff4b4b;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0 1.1rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, opacity 0.15s;
  }
  #next:hover { background: #e63e3e; }
  #next:disabled { opacity: 0.45; cursor: default; }

  .hint { font-size: 0.78rem; color: #808495; margin-top: 5px; min-height: 1rem; }
</style>
</head>
<body>
  <div class="row">
    <div class="wrap">
      <input id="answer" type="text" autocomplete="off"
             placeholder="Type or speak, then press Enter or Next" />
      <button id="mic" title="Click to speak">🗣️</button>
    </div>
    <button id="next" title="Submit this answer and go to the next question">Next →</button>
  </div>
  <div class="hint" id="hint"></div>

<script>
  // ---------------------------------------------------------------
  // Minimal Streamlit component protocol (no npm build required).
  // ---------------------------------------------------------------
  function send(type, data) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
    );
  }
  const Streamlit = {
    ready:     () => send("streamlit:componentReady", { apiVersion: 1 }),
    setHeight: (h) => send("streamlit:setFrameHeight", { height: h }),
    setValue:  (v) => send("streamlit:setComponentValue", { value: v, dataType: "json" }),
  };

  const input   = document.getElementById("answer");
  const mic     = document.getElementById("mic");
  const nextBtn = document.getElementById("next");
  const hint    = document.getElementById("hint");

  let submitCount = 0;   // increments on each submit so repeat answers still register
  let usedVoice   = false;
  let speechLang  = "en-US";   // updated from Python via component args
  let listening   = false;     // hoisted so submit() can stop an active dictation

  // ---------------------------------------------------------------
  // Collapse immediately-repeated phrases for a clean live display,
  // e.g. "my name is my name is Amartya" -> "my name is Amartya".
  // The final answer is further refined by the AI on the Python side.
  // ---------------------------------------------------------------
  function collapseRepeats(text) {
    let words = text.split(" ").filter(Boolean);
    for (let n = 6; n >= 1; n--) {
      const out = [];
      let i = 0;
      while (i < words.length) {
        const a = words.slice(i, i + n).join(" ").toLowerCase();
        const b = words.slice(i + n, i + 2 * n).join(" ").toLowerCase();
        if (a && a === b) { i += n; }          // drop this copy, keep the next
        else { out.push(words[i]); i += 1; }
      }
      words = out;
    }
    return words.join(" ");
  }

  // Shared submit path used by both Enter and the Next button.
  function submit() {
    const text = input.value.trim();
    if (!text) { hint.textContent = "Please type or speak an answer first."; return; }
    if (listening && recog) { try { recog.stop(); } catch (err) { /* ignore */ } }
    submitCount += 1;
    Streamlit.setValue({
      text: text,
      count: submitCount,
      method: usedVoice ? "voice" : "typed",
    });
  }

  // Press Enter -> submit.
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); submit(); }
  });

  // Click Next -> submit.
  nextBtn.addEventListener("click", submit);

  // ---------------------------------------------------------------
  // Live dictation via the browser's Web Speech API (Chrome/Edge).
  // Interim results stream into the box as you talk.
  // ---------------------------------------------------------------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;   // hoisted so the render handler can update its language

  if (!SR) {
    mic.style.display = "none";
    hint.textContent = "Live voice needs Chrome or Edge. You can still type your answer.";
  } else {
    recog = new SR();
    recog.continuous = true;
    recog.interimResults = true;
    recog.lang = speechLang;

    let baseText = "";   // text committed before the current interim chunk

    mic.addEventListener("click", () => {
      if (listening) { recog.stop(); return; }
      // Starting voice input discards any typed text so dictation begins fresh.
      input.value = "";
      baseText = "";
      try { recog.start(); } catch (err) { /* ignore double-start */ }
    });

    recog.onstart = () => {
      listening = true;
      usedVoice = true;
      mic.classList.add("listening");
      hint.textContent = "Listening… speak now (click 🗣️ to stop).";
    };
    recog.onend = () => {
      listening = false;
      mic.classList.remove("listening");
      if (hint.textContent.startsWith("Listening")) hint.textContent = "";
    };
    recog.onerror = (e) => { hint.textContent = "Mic error: " + e.error; };

    recog.onresult = (event) => {
      let interim = "", final = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) final += t; else interim += t;
      }
      if (final) baseText += final;
      const display = (baseText + interim).replace(/\s+/g, " ").trim();
      input.value = collapseRepeats(display);
    };
  }

  // ---------------------------------------------------------------
  // Boot up — receive args (speech language, placeholder, label) from Python
  // ---------------------------------------------------------------
  window.addEventListener("message", (e) => {
    if (e.data && e.data.type === "streamlit:render") {
      const args = e.data.args || {};
      if (args.lang) {
        speechLang = args.lang;
        if (recog) recog.lang = speechLang;
      }
      if (args.placeholder) input.placeholder = args.placeholder;
      if (args.next_label) nextBtn.textContent = args.next_label;
      Streamlit.setHeight(84);
    }
  });
  Streamlit.ready();
  Streamlit.setHeight(84);
  setTimeout(() => input.focus(), 150);
</script>
</body>
</html>
